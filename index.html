<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1e3a5f">
<title>English Phrasebook — Розмовник</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Розмовник">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f4ede2;
  --bg-card: #fbf6ec;
  --ink: #1a1a1a;
  --ink-soft: #4a4a4a;
  --ink-faint: #8a8278;
  --accent: #1e3a5f;
  --accent-soft: #2d5081;
  --highlight: #8b2c2c;
  --line: #d9cdb8;
  --line-soft: #ebe2d0;
  --shadow: 0 1px 3px rgba(58, 38, 16, 0.06), 0 4px 12px rgba(58, 38, 16, 0.04);
  --shadow-hover: 0 4px 10px rgba(58, 38, 16, 0.1), 0 12px 28px rgba(58, 38, 16, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

body {
  background-image:
    radial-gradient(at 20% 10%, rgba(139, 44, 44, 0.04) 0px, transparent 50%),
    radial-gradient(at 80% 90%, rgba(30, 58, 95, 0.05) 0px, transparent 50%);
  padding-bottom: 40px;
}

/* === HEADER === */
.header {
  padding: 28px 20px 20px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  background: var(--bg-card);
  position: relative;
}

.header::before, .header::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 1px;
  background: var(--highlight);
  opacity: 0.5;
}
.header::before { top: 16px; }
.header::after { bottom: 12px; }

.header h1 {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 26px;
  letter-spacing: 0.02em;
  color: var(--accent);
  margin-bottom: 4px;
}

.header .subtitle {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
}

/* === MAIN === */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* === BREADCRUMB === */
.crumb {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  font-size: 14px;
  color: var(--ink-faint);
}

.crumb button {
  background: none;
  border: none;
  color: var(--accent);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 0;
}

.crumb button:hover { text-decoration: underline; }

.crumb .sep { color: var(--line); }

/* === THEMES GRID === */
.themes-intro {
  text-align: center;
  margin-bottom: 28px;
  padding: 0 12px;
}
.themes-intro p {
  font-family: 'Lora', serif;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 15px;
}

.themes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

.theme-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  text-align: left;
  font-family: inherit;
  color: inherit;
  box-shadow: var(--shadow);
}

.theme-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}

.theme-card .icon {
  font-size: 28px;
  margin-bottom: 10px;
  display: block;
  line-height: 1;
}

.theme-card .title-en {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 2px;
}

.theme-card .title-ua {
  font-size: 13px;
  color: var(--ink-faint);
  margin-bottom: 10px;
}

.theme-card .count {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 12px;
  color: var(--highlight);
  letter-spacing: 0.05em;
}

/* === PHRASE LIST === */
.theme-header {
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--line);
}

.theme-header h2 {
  font-family: 'Lora', serif;
  font-weight: 600;
  font-size: 24px;
  color: var(--accent);
  margin-bottom: 4px;
}

.theme-header .ua-title {
  font-family: 'Lora', serif;
  font-style: italic;
  color: var(--ink-faint);
  font-size: 15px;
}

.phrases {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.phrase {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 16px 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  transition: all 0.2s ease;
}

.phrase:hover {
  box-shadow: var(--shadow);
  border-left-color: var(--highlight);
}

.phrase-text {
  min-width: 0;
}

.phrase-en {
  font-family: 'Lora', serif;
  font-weight: 500;
  font-size: 17px;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.4;
}

.phrase-transcription {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-faint);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.phrase-ua {
  font-size: 14px;
  color: var(--ink-soft);
}

.speak-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.speak-btn:hover {
  background: var(--highlight);
  transform: scale(1.08);
}

.speak-btn:active { transform: scale(0.95); }

.speak-btn.playing {
  background: var(--highlight);
  animation: pulse 1s ease infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.speak-btn svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

/* === INSTALL BANNER === */
.install-banner {
  display: none;
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  max-width: 400px;
  margin: 0 auto;
  background: var(--accent);
  color: white;
  padding: 14px 18px;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(30, 58, 95, 0.3);
  z-index: 100;
  align-items: center;
  gap: 12px;
}

.install-banner.show { display: flex; }

.install-banner-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.4;
}

.install-banner button {
  background: white;
  color: var(--accent);
  border: none;
  padding: 8px 14px;
  border-radius: 4px;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
}

.install-banner .close-banner {
  background: transparent;
  color: white;
  padding: 4px 8px;
  font-size: 18px;
  opacity: 0.7;
}

/* === MOBILE === */
@media (max-width: 480px) {
  .header { padding: 22px 16px 16px; }
  .header h1 { font-size: 22px; }
  .main { padding: 18px 12px; }
  .themes { grid-template-columns: 1fr; gap: 10px; }
  .theme-card { padding: 18px 16px; }
  .phrase { grid-template-columns: 1fr auto; padding: 14px 14px; }
  .phrase-en { font-size: 16px; }
  .theme-header h2 { font-size: 20px; }
}

/* === HIDDEN === */
.hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <h1>English Phrasebook</h1>
  <div class="subtitle">— Розмовник британської англійської —</div>
</header>

<main class="main">

  <!-- Crumb (visible inside a theme) -->
  <div class="crumb hidden" id="crumb">
    <button id="back-btn">← Усі теми</button>
  </div>

  <section id="themes-screen">

    </div>

    <div class="theme-header">

      <div class="ua-title" id="theme-title-ua"></div>
    </div>
    <div class="phrases" id="phrases-list"></div>
  </section>

</main>

<!-- Install banner -->
<div class="install-banner" id="install-banner">
  <div class="install-banner-text">

  <button id="install-btn">Встановити</button>
  <button class="close-banner" id="close-banner">×</button>
</div>

// ========== СТАН ==========
let currentTheme = null;
let britishVoice = null;

// ========== ОЗВУЧКА ==========
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  // Шукаємо британський голос
  britishVoice =
    voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) ||
    voices.find(v => v.lang === 'en-GB' && v.name.includes('Kate')) ||
    voices.find(v => v.lang === 'en-GB' && v.name.includes('Serena')) ||
    voices.find(v => v.lang === 'en-GB') ||
    voices.find(v => v.lang.startsWith('en-GB')) ||
    voices.find(v => v.lang.startsWith('en'));
}

if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, button) {
  if (!('speechSynthesis' in window)) {
    alert('На жаль, ваш браузер не підтримує озвучку.');
    return;
  }

  // Зупиняємо попереднє
  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-GB';
  utterance.rate = 0.9;
  utterance.pitch = 1.0;

  if (britishVoice) {
    utterance.voice = britishVoice;
  }

  // Прибираємо клас "playing" з усіх кнопок
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));

  if (button) {
    button.classList.add('playing');
    utterance.onend = () => button.classList.remove('playing');
    utterance.onerror = () => button.classList.remove('playing');
  }

  speechSynthesis.speak(utterance);
}

// ========== РЕНДЕР ==========
function renderThemes() {
  const grid = document.getElementById('themes-grid');
  grid.innerHTML = THEMES.map(theme => `
    <button class="theme-card" data-theme-id="${theme.id}">
      <span class="icon">${theme.icon}</span>
      <div class="title-en">${theme.titleEn}</div>
      <div class="title-ua">${theme.titleUa}</div>
      <div class="count">${theme.phrases.length} фраз</div>
    </button>
  `).join('');

  grid.querySelectorAll('.theme-card').forEach(card => {
    card.addEventListener('click', () => {
      const themeId = card.dataset.themeId;
      openTheme(themeId);
    });
  });
}

function openTheme(themeId) {
  currentTheme = THEMES.find(t => t.id === themeId);
  if (!currentTheme) return;

  document.getElementById('themes-screen').classList.add('hidden');
  document.getElementById('phrases-screen').classList.remove('hidden');
  document.getElementById('crumb').classList.remove('hidden');

  document.getElementById('theme-title-en').textContent = currentTheme.titleEn;
  document.getElementById('theme-title-ua').textContent = currentTheme.titleUa;

  const list = document.getElementById('phrases-list');
  list.innerHTML = currentTheme.phrases.map((p, i) => `
    <div class="phrase">
      <div class="phrase-text">
        <div class="phrase-en">${escapeHtml(p.en)}</div>
        <div class="phrase-transcription">${escapeHtml(p.ipa)}</div>
        <div class="phrase-ua">${escapeHtml(p.ua)}</div>
      </div>
      <button class="speak-btn" data-phrase-index="${i}" aria-label="Озвучити фразу">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </button>
    </div>
  `).join('');

  list.querySelectorAll('.speak-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.phraseIndex);
      speak(currentTheme.phrases[i].en, btn);
    });
  });

  window.scrollTo(0, 0);
}

function backToThemes() {
  document.getElementById('themes-screen').classList.remove('hidden');
  document.getElementById('phrases-screen').classList.add('hidden');
  document.getElementById('crumb').classList.add('hidden');
  speechSynthesis.cancel();
  currentTheme = null;
  window.scrollTo(0, 0);
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ========== ІНІЦІАЛІЗАЦІЯ ==========
document.addEventListener('DOMContentLoaded', () => {
  renderThemes();
  document.getElementById('back-btn').addEventListener('click', backToThemes);
});

// ========== PWA: SERVICE WORKER ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW failed:', err));
  });
}

// ========== PWA: INSTALL PROMPT ==========
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const closeBanner = document.getElementById('close-banner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Показуємо банер тільки якщо користувач не закривав його
  if (!localStorage.getItem('installBannerDismissed')) {
    banner.classList.add('show');
  }
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
});

closeBanner.addEventListener('click', () => {
  banner.classList.remove('show');
  localStorage.setItem('installBannerDismissed', '1');
});
</script>
